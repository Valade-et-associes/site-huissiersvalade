[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_OWNER,GITHUB_REPO,GITHUB_BRANCH,GRAPH_SENDER_USER,OFFER_FALLBACK_EMAIL"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/juriweb/"
  to = "https://valade.juriweb.ca/"
  status = 302

[[redirects]]
  from = "/team/employe-4/"
  to = "/team/luc-valade/"
  status = 301

[[redirects]]
  from = "/team/employe-8/"
  to = "/team/charles-valade/"
  status = 301

[[redirects]]
  from = "/categorie-produit/vehicule-francois/page/*"
  to = "/categorie-produit/vehicule-francois/"
  status = 301
